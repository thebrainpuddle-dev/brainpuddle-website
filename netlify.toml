[build]
  command = "bun run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20.19.0"

[[redirects]]
  from = "/api/share-card/create"
  to = "/.netlify/functions/share-card-create"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/s/*"
  to = "/.netlify/functions/share-resolve/:splat"
  status = 200

## PostHog reverse proxy (reduces adblock impact)
## If your project is in EU, change the target host accordingly.
[[redirects]]
  from = "/ingest/static/*"
  to = "https://us.i.posthog.com/static/:splat"
  status = 200

[[redirects]]
  from = "/ingest/*"
  to = "https://us.i.posthog.com/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
